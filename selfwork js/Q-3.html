<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Display Products</title>

    <style>
        body {
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #bcb9b9;
            padding: 10px;
            text-align: center;
        }

        img {
            width: 70px;
            height: 70px;
            object-fit: cover;
        }

        th {
            background: white;
        }
    </style>
</head>

<body>

    <h1>Product Table</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Category</th>
            </tr>
        </thead>

        <tbody id="tbody"></tbody>
    </table>

    <script>
        let products = [
            {
                id: 1,
                name: "Headphones",
                description: "Noise cancelling",
                price: 1999,
                category: "Electronics",
                image: "https://m.media-amazon.com/images/I/61CGHv6kmWL._SL1500_.jpg"
            },
            {
                id: 2,
                name: "Shoes",
                description: "Running shoes",
                price: 1499,
                category: "Footwear",
                image: "https://m.media-amazon.com/images/I/71li-ujtlUL._UL1500_.jpg"
            },
            {
                id: 3,
                name: "Chair",
                description: "Comfortable chair",
                price: 2999,
                category: "Furniture",
                image: "https://m.media-amazon.com/images/I/71kr3WAj1FL._SL1500_.jpg"
            },
            {
                id: 4,
                name: "Watch",
                description: "Stylish watch",
                price: 999,
                category: "Accessories",
                image: "https://m.media-amazon.com/images/I/61y2VVWcGBL._UL1500_.jpg"
            },
            {
                id: 5,
                name: "Backpack",
                description: "Travel backpack",
                price: 899,
                category: "Bags",
                image: "https://m.media-amazon.com/images/I/81k6l5lF6JL._UL1500_.jpg"
            }
        ];

        let tbody = document.getElementById("tbody");

        products.forEach((product) => {
            tbody.innerHTML += `
    <tr>
      <td>${product.id}</td>
      <td><img src="${product.image}"></td>
      <td>${product.name}</td>
      <td>${product.description}</td>
      <td>₹${product.price}</td>
      <td>${product.category}</td>
    </tr>
  `;
        });
    </script>

</body>

</html>
