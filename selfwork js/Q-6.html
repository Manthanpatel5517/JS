<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Manager</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        img {
            width: 70px;
            height: 70px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <h1>Product Manager</h1>

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="desc" placeholder="Description">
    <input type="number" id="price" placeholder="Price">
    <input type="text" id="category" placeholder="Category">
    <input type="text" id="image" placeholder="Image URL">

    <button id="btn" onclick="handleProduct()">Add Product</button>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        let products = [
  {
    id: 1,
    name: "Headphones",
    description: "Noise cancelling",
    price: 1999,
    category: "Electronics",
    image: "https://images.unsplash.com/photo-1518441902110-5f5b6b8c3f9a"
  },
  {
    id: 2,
    name: "Shoes",
    description: "Running shoes",
    price: 1499,
    category: "Footwear",
    image: "https://images.unsplash.com/photo-1528701800489-20be3cfa7c4c"
  },
  {
    id: 3,
    name: "Chair",
    description: "Comfortable chair",
    price: 2999,
    category: "Furniture",
    image: "https://images.unsplash.com/photo-1586023492125-27b2c045efd7"
  },
  {
    id: 4,
    name: "Watch",
    description: "Stylish watch",
    price: 999,
    category: "Accessories",
    image: "https://images.unsplash.com/photo-1519741497674-611481863552"
  },
  {
    id: 5,
    name: "Backpack",
    description: "Travel backpack",
    price: 899,
    category: "Bags",
    image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"
  }
];

        let editIndex = -1;

        function displayProducts() {
            let tbody = document.getElementById("tbody");
            tbody.innerHTML = "";

            products.forEach((p, index) => {
                tbody.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td>
          <img src="${p.image}" onerror="this.src='https://via.placeholder.com/70'">
        </td>
        <td>${p.name}</td>
        <td>${p.description}</td>
        <td>₹${p.price}</td>
        <td>${p.category}</td>
        <td>
          <button onclick="editProduct(${index})">Edit</button>
          <button onclick="deleteProduct(${index})">Delete</button>
        </td>
      </tr>
    `;
            });
        }

        function handleProduct() {
            let name = document.getElementById("name").value;
            let desc = document.getElementById("desc").value;
            let price = document.getElementById("price").value;
            let category = document.getElementById("category").value;
            let image = document.getElementById("image").value;

            if (editIndex === -1) {
                products.push({
                    id: products.length + 1,
                    name, description: desc, price, category, image
                });
            } else {
                products[editIndex] = {
                    ...products[editIndex],
                    name, description: desc, price, category, image
                };
                editIndex = -1;
                document.getElementById("btn").innerText = "Add Product";
            }

            displayProducts();
            clearForm();
        }

        function editProduct(index) {
            let p = products[index];

            document.getElementById("name").value = p.name;
            document.getElementById("desc").value = p.description;
            document.getElementById("price").value = p.price;
            document.getElementById("category").value = p.category;
            document.getElementById("image").value = p.image;

            editIndex = index;
            document.getElementById("btn").innerText = "Update Product";
        }

        function deleteProduct(index) {
            let confirmDelete = confirm("Are you sure you want to delete this product?");

            if (confirmDelete) {
                products.splice(index, 1);
                displayProducts();
                alert("Product deleted successfully.");
            }
        }

        function clearForm() {
            document.getElementById("name").value = "";
            document.getElementById("desc").value = "";
            document.getElementById("price").value = "";
            document.getElementById("category").value = "";
            document.getElementById("image").value = "";
        }

        displayProducts();
    </script>

</body>

</html>
