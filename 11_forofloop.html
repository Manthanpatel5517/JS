<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Product Card</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#e3f2fd,#ffffff);
}

#main-container{
    width:80%;
    margin:50px auto;
    display:flex;
    justify-content: space-around;
    padding:25px;
    background:#fff;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    transition:0.3s;
}

#main-container:hover{
    transform: translateY(-5px);
}

.image img{
    width:350px;
    height:390px;
    object-fit:cover;
    border-radius:15px;
    transition:0.3s;
}

.detail h2{
    font-size:24px;
    margin-bottom:10px;
}

.rating{
    color:#fbc02d;
    font-size:18px;
}

.price{
    font-size:28px;
    color:#2e7d32;
    font-weight:bold;
    margin:10px 0;
}

.btn{
    display:inline-block;
    padding:10px 20px;
    background:#1976d2;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

.btn:hover{
    background:#0d47a1;
}

ul{
    margin-top:15px;
    padding-left:20px;
}

ul li{
    margin-bottom:8px;
    line-height:1.4;
}
</style>
</head>

<body>

<div id="main-container">
    
    <div class="image">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_xEkToHEm5bU3ZZcIWCz3mJ53HX-j2WIeuA&s">
    </div>

    <div class="detail">
        <h2>ZEBRONICS Storm Wired Headphone</h2>

        <div class="rating">
            3.7
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-regular fa-star"></i>
        </div>

        <div class="price">₹499</div>

        <button class="btn">Add to Cart</button>

        <h3>Key Features:</h3>
        <ul id="key"></ul>
    </div>

</div>

<script>
const product = [
    "Stylish & lightweight design",
    "Compatible with mobile & tablets",
    "40mm powerful sound drivers",
    "Soft ear cushions for comfort",
    "3.5mm jack with long cable",
    "Built-in microphone for calls"
];

let data = "";

for(const item of product){
    data += `<li>${item}</li>`;
}

document.getElementById('key').innerHTML = data;
</script>

</body>
</html>
