<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="container">
        <input type="text" id="search" placeholder="Search products">

        <select name="category" id="category">
            <option value="all">All</option>
            <option value="Electronic">Electronic</option>
            <option value="Footwear">Footwear</option>
            <option value="Furniture">Furniture</option>
        </select>

        <select name="sort" id="sort">
            <option value="">Sort By Price</option>
            <option value="low">low to high</option>
            <option value="high">high to low</option>
        </select>

        <div id="alldata">

        </div>
    </div>


    <script>
        const products = [
            {
                name: "iPhone 15",
                description: "Apple smartphone with A16 Bionic chip and advanced camera system",
                price: 799,
                category: "Electronics",
                image: "https://encrypted-tbn0.gstatic.com/shopping?q=tbn:ANd9GcRgDVLegDd3sEzXpp-VAUpugHDya4A9FK5GlFmQLSFMkAOUjbM8vTFrLejCceQWbVmplfEpkIe6LH-kW2skg3jiXUMC1OV_VQ"
            },
            {
                name: "Samsung Galaxy S24",
                description: "Android smartphone with AI features and AMOLED display",
                price: 849,
                category: "Electronics",
                image: "https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcR7CcAjOwScLtqwozQ_PHn0JligXSyGNWaILmD27MJj1bq3oe7R1DQbsTQdC6nJkIuXruMSzxqwpsRcM9QBqBv-b0-WBGkN"
            },
            {
                name: "Nike Air Max 270",
                description: "Comfortable running shoes with Air cushioning",
                price: 150,
                category: "Footwear",
                image: "https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcQsdnYIWi7eclv-wfEa9DZpfRLgDMpRBNgJrIFbew9eKDBE1NXafVFCzx7TfT67vxZ3V_g7C94CIF3hjlXfh_3-7lmfohQuaS_O-XohGvECLeCV7xegYTnWHQ"
            },
            {
                name: "Adidas Ultraboost Light",
                description: "Lightweight performance running shoes",
                price: 190,
                category: "Footwear",
                image: "https://rukminim2.flixcart.com/image/1500/1500/xif0q/shoe/5/0/6/-original-imahgbrwwhcwrm8p.jpeg"
            },
            {
                name: "Wooden Dining Table",
                description: "6-seater solid wood dining table",
                price: 450,
                category: "Furniture",
                image: "https://m.media-amazon.com/images/I/61ZUR4pFKyL.jpg"
            },
            {
                name: "Office Ergonomic Chair",
                description: "Adjustable chair with lumbar support",
                price: 220,
                category: "Furniture",
                image: "https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcRP9_xOxhmBprQYtZRJMilBl6b0kDt66GcyVWhzhXoig3WMASUb7bcAPRpTsqcDA5Qv2lK6VVzXhtlDWBRo48vmFBcSwkiF-GTPIsyjTiYz"
            }
        ];

        const searchselect = document.getElementById("search");
        const categoryselect = document.getElementById("category");
        const sortselect = document.getElementById("sort");
        const alldataselect = document.getElementById("alldata");

        function displaydata(d) {
            
            alldataselect.innerHTML = "";

            d.forEach((product) => {
                const card = document.createElement('div');
                card.classList.add('product-card');


                card.innerHTML = `
                <img src="${product.image}" alt="">
                <h2>${product.name}</h2>
                <p>${product.description}</p>
                <p>${product.price}</p>
                <p>${product.category}</p>
                <button>Shop Now</button>
                `;
                alldata.appendChild(card);
            });

        }


        function filterdata(){
            let input = [... products];

            let searchvalue = searchselect.value.toLowerCase();
            let categoryvalue = categoryselect.value;
            let sortvalue = sortselect.value;

            input = input.filter((p) => {
                return p.name.toLocaleLowerCase().includes(searchvalue);
            })

            if(categoryvalue !== 'all'){
                input = input.filter(p=>p.category == categoryvalue);
            }

            if(sortvalue == "low"){
                input = input.sort((x,y)=>x.price - y.price);
            }

           
             if(sortvalue == "high"){
                input = input.sort((x,y)=>y.price - x.price);
            }
            displaydata(input);
        }


        searchselect.addEventListener("input",filterdata);
        categoryselect.addEventListener("change",filterdata);
        sortselect.addEventListener("change",filterdata);

        displaydata(products);
    </script>
</body>

</html>
