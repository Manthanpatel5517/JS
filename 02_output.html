<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>output method in javascript</title>
</head>
<body>

        console.log('Welcome To Gandhinagar..')

    </script>
</body>
</html>
