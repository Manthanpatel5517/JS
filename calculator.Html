<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable in javascript</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            gap: 45px;
        }

        .card {
            width: 330px;
            padding: 22px;
            background-color: rgb(96, 168, 210);
            border-radius: 15px;

        }

        input {
            width: 100%;
            font-size: 20px;
            padding: 10px;
            margin: 10px;
            border-radius: 15px;
        }

        button {
            width: 100%;
            font-size: 25px;
            margin: 10px;
            border-radius: 12px;
            padding: 8px;
        }

        #ans {
            padding: 10px;
            margin-left: 45px;
        }

        #subans {
            padding: 10px;
            margin-left: 45px;
        }

        #mulans {
            padding: 10px;
            margin-left: 45px;
        }

        #divans {
            padding: 10px;
            margin-left: 45px;
        }
    </style>
</head>

<body>

    <div class="card">
        <input type="number" id="num1" placeholder="num 1">
        <input type="number" id="num2" placeholder="num 2">
        <button onclick="addition()">+</button>
        <h2 id="ans"></h2>
    </div>

    <div class="card">
        <input type="number" id="sub1" placeholder="num1">
        <input type="number" id="sub2" placeholder="num2">
        <button onclick="substraction()">-</button>
        <h2 id="subans"></h2>
    </div>

    <div class="card">
        <input type="number" id="mul1" placeholder="num1">
        <input type="number" id="mul2" placeholder="num2">
        <button onclick="multiplication()">*</button>
        <h2 id="mulans"></h2>

    </div>

    <div class="card">
        <input type="number" id="div1" placeholder="num1">
        <input type="number" id="div2" placeholder="num2">
        <button onclick="division()">/</button>
        <h2 id="divans"></h2>

    </div>
    <script>
        function addition() {
            let num1 = document.getElementById('num1').value;
            let num2 = document.getElementById('num2').value;
            let ans = parseInt(num1) + parseInt(num2);
            document.getElementById('ans').innerHTML = "Answer is:" + ans;
        }

        function substraction() {
            let num1 = document.getElementById('sub1').value;
            let num2 = document.getElementById('sub2').value;
            let ans = parseInt(num1) - parseInt(num2);
            document.getElementById('subans').innerHTML = "Answer is:" + ans;
        }

        function multiplication() {
            let num1 = document.getElementById('mul1').value;
            let num2 = document.getElementById('mul2').value;
            let ans = parseInt(num1) * parseInt(num2);
            document.getElementById('mulans').innerHTML = "Answer is:" + ans;
        }

        function division() {
            let num1 = document.getElementById('div1').value;
            let num2 = document.getElementById('div2').value;
            let ans = parseInt(num1) / parseInt(num2);
            document.getElementById('divans').innerHTML = "Answer is:" + ans;
        }
    </script>
</body>

</html>
