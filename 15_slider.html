<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slider</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #slide {
            width: 80%;
            margin: 50px auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #ccc;
            padding: 20px;
        }

        .slide-left {
            width: 50%;
        }

        .slide-left h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .slide-left p {
            font-size: 16px;
            margin-bottom: 15px;
        }

        .slide-left button {
            padding: 8px 15px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
        }

        .slide-right {
            width: 50%;
        }

        .slide-right img {
            width: 100%;
            height: auto;
        }

        #prevbtn{
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
        }
        #nextbtn {
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="slider">
        <div id="prevbtn" class="prevbtn"><i class="fa-solid fa-angle-left"></i></div>
        <div id="slide"></div>
        <div id="nextbtn" class="nextbtn"><i class="fa-solid fa-angle-right"></i></div>
    </div>



    <script>
        const slides = [
            {
                id: 1,
                title: "Taste the Freshness in Every Bite",
                description:
                    "Experience chef-crafted dishes made with the freshest ingredients, delivering unforgettable flavors straight to your table.",
                buttonText: "Order Now",
                image: "https://media.istockphoto.com/id/1147252758/photo/healthy-vegetarian-food-background-vegetables-pesto-and-lentil-curry-with-tofu.jpg?s=612x612&w=0&k=20&c=tfLYLtT-f_I-tnmOdb_6WHRhIQa8jXy7SkFakC-P-LU=",
            },
            {
                id: 2,
                title: "Your Favorite Meals, Delivered Fast",
                description:
                    "Enjoy hot and delicious meals delivered to your doorstep with speed, quality, and care.",
                buttonText: "View Menu",
                image: "https://res.cloudinary.com/hz3gmuqw6/image/upload/c_fill,f_auto,h_400,q_60,w_600/v1/classpop/676136f4c8c7a.jpg",
            },
            {
                id: 3,
                title: "Exclusive Deals for Food Lovers",
                description:
                    "Discover daily specials, family combos, and limited-time offers crafted to satisfy every craving.",
                buttonText: "Explore Offers",
                image: "https://media.hellofresh.com/w_3840,q_auto,f_auto,c_limit,fl_lossy/hellofresh_website/se/cms/SEO/vegetarisk_matkasse.jpg",
            },
        ];

        const prevbtn = document.getElementById('prevbtn');
        const nextbtn = document.getElementById('nextbtn');
        const slide = document.getElementById('slide');

        let slideCount = 0;

        function displaycontent() {
            slide.innerHTML = `
            <div class="slide-left">
                <h1>${slides[slideCount].title}</h1>
                <p>${slides[slideCount].description}</p>
                <button>${slides[slideCount].buttonText}</button>
            </div>
            <div class="slide-right">
                <img src="${slides[slideCount].image}" alt="">
            </div>
            `;
        }

        prevbtn.addEventListener('click', () => {
            slideCount--;
            if (slideCount < 0) {
                slideCount = slides.length - 1;

            }
            displaycontent();

        })

        nextbtn.addEventListener('click', () => {
            slideCount ++;
            if (slideCount >= slides.length) {
                slideCount = 0;

            }
            displaycontent();

        })

        displaycontent();

    </script>
</body>

</html>
